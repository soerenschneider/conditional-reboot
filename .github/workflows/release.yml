---
on:
  push:
    branches:
      - main
name: release-please
jobs:
  release-please:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: GoogleCloudPlatform/release-please-action@v3.7.3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: simple
          package-name: conditional-reboot
